apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner
  namespace: caywoodridge
  labels:
    app: github-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-runner
  template:
    metadata:
      labels:
        app: github-runner
    spec:
      containers:
        - name: runner
          image: myoung34/github-runner:latest
          env:
            - name: RUNNER_SCOPE
              value: repo
            - name: REPO_URL
              value: https://github.com/RFXTECH/caywoodridge.com
            - name: LABELS
              value: self-hosted
            - name: EPHEMERAL
              value: "false"
            - name: GITHUB_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-runner-secret
                  key: token
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
